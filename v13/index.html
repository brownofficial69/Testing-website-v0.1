<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Time-Travel Portfolio | Shadman Hossain</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='none' stroke='%234a90e2' stroke-width='3'/><path d='M50,50 L50,20 M50,50 L70,50' stroke='%234a90e2' stroke-width='2'/></svg>"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- Timeline background -->
  <canvas id="timeline-canvas"></canvas>

  <!-- Timeline container -->
  <div class="timeline-wrapper">
    <div class="timeline-header">
      <h1>Time-Travel Through My Cybersecurity Journey</h1>
      <p>Explore how I've grown from 2020 to 2026</p>
    </div>

    <!-- Timeline slider -->
    <div class="timeline-slider">
      <input type="range" id="year-slider" min="2020" max="2026" value="2026" class="slider"/>
      <div class="year-display" id="year-display">2026</div>
    </div>

    <!-- Main timeline -->
    <svg id="timeline-svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="timelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
          <stop offset="50%" style="stop-color:#4a90e2;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#50fa7b;stop-opacity:1" />
        </linearGradient>
      </defs>

      <!-- Timeline base -->
      <line x1="50" y1="200" x2="1150" y2="200" stroke="url(#timelineGradient)" stroke-width="3"/>

      <!-- Timeline events will be added by JS -->
      <g id="timeline-events"></g>
    </svg>

    <!-- Info panel -->
    <div class="info-panel">
      <h2 id="event-title">2020: The Beginning</h2>
      <p id="event-description"></p>
      <div id="event-achievements"></div>
      <div id="event-stats"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="prev-year" onclick="previousYear()" class="control-btn">← Previous</button>
      <button id="next-year" onclick="nextYear()" class="control-btn">Next →</button>
      <button id="auto-play" onclick="toggleAutoPlay()" class="control-btn">▶ Auto-Play</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
