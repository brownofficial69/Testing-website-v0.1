<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Shadman Hossain | Polaroid Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="corkboard" id="board">
    <div class="board-grain"></div>
    <!-- Title card -->
    <div class="polaroid p-title" id="p-intro" style="top:40px;left:calc(50% - 130px)">
      <div class="pol-inner pol-yellow">
        <div class="pol-photo-area" style="background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px">
          <span style="font-size:40px;font-weight:900;color:#fff;font-family:Inter">SH</span>
          <span style="font-size:10px;color:rgba(255,255,255,0.5);font-family:Inter;letter-spacing:2px">CYBER ANALYST</span>
        </div>
        <div class="pol-caption">Shadman Hossain · 2026</div>
      </div>
      <div class="pin"></div>
    </div>
    <!-- Polaroids generated by JS -->
  </div>
  <div class="hint-bar">◈ Drag polaroids · Hover to read</div>
  <script src="script.js"></script>
</body>
</html>
