<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadman Hossain | Universe Portfolio</title>
  <meta name="description" content="Shadman Hossain — Cybersecurity Portfolio. Explore the universe." />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══ BOOT SCREEN ══ -->
<div id="boot-screen">
  <canvas id="boot-canvas"></canvas>
  <div class="boot-inner">
    <p class="boot-logo">[ SH ]</p>
    <div id="boot-log"></div>
    <div class="boot-bar-wrap"><div class="boot-bar" id="boot-bar"></div></div>
    <p class="boot-status" id="boot-status">CALIBRATING STAR CHARTS...</p>
  </div>
</div>

<!-- ══ CURSOR ══ -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- ══ MAIN UNIVERSE CANVAS ══ -->
<canvas id="universe-canvas"></canvas>

<!-- ══ SPACE MAP UI ══ -->
<div id="space-ui">
  <!-- Hero text in centre -->
  <div id="space-hero">
    <p class="hero-cmd">// portfolio.exe</p>
    <h1 id="hero-name">Shadman Hossain</h1>
    <div class="hero-role">
      <span class="hero-prompt">$&gt;&nbsp;</span>
      <span id="typing-target"></span><span class="cursor"></span>
    </div>
    <p class="hero-hint">select a galaxy to explore</p>
  </div>

  <!-- Galaxy labels (positioned dynamically by JS) -->
  <div id="galaxy-labels">
    <div class="glabel" id="gl-about"          data-galaxy="about"         >About</div>
    <div class="glabel" id="gl-skills"         data-galaxy="skills"        >Skills</div>
    <div class="glabel" id="gl-projects"       data-galaxy="projects"      >Projects</div>
    <div class="glabel" id="gl-education"      data-galaxy="education"     >Education</div>
    <div class="glabel" id="gl-certifications" data-galaxy="certifications">Certifications</div>
    <div class="glabel" id="gl-contact"        data-galaxy="contact"       >Contact</div>
  </div>
</div>

<!-- ══ SOLAR SYSTEM OVERLAY (shown when inside a galaxy) ══ -->
<div id="ss-overlay" class="ss-hidden">
  <div id="ss-header">
    <p class="ss-eyebrow">// navigating</p>
    <h2 id="ss-name"></h2>
    <p class="ss-hint">click an orbiting body to explore</p>
  </div>
  <button id="ss-back">
    <i class="fas fa-chevron-left"></i> Universe Map
  </button>
</div>

<!-- ══ CONTENT PANEL ══ -->
<div id="content-panel">
  <button id="panel-close" aria-label="Close">
    <i class="fas fa-times"></i>
  </button>
  <div id="panel-body"></div>
</div>

<!-- ══ PROJECT DETAIL MODAL ══ -->
<div class="modal-overlay" id="modal-overlay" aria-hidden="true">
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" id="modal-close" aria-label="Close"><i class="fas fa-times"></i></button>
    <div class="modal-header">
      <div class="modal-icon-wrap" id="modal-icon-wrap"><i id="modal-icon" class="fas fa-folder"></i></div>
      <div>
        <p class="modal-cat" id="modal-category-label"></p>
        <h2 class="modal-title" id="modal-title"></h2>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-sec"><h3 class="modal-sh">Overview</h3><p id="modal-description"></p></div>
      <div class="modal-sec" id="modal-highlights-wrap"><h3 class="modal-sh">Key Highlights</h3><ul id="modal-highlights"></ul></div>
      <div class="modal-sec" id="modal-tech-wrap"><h3 class="modal-sh">Technologies</h3><div class="tech-pills" id="modal-tech-pills"></div></div>
      <div class="modal-sec" id="modal-mitre-wrap"><h3 class="modal-sh">MITRE ATT&amp;CK</h3><div id="modal-mitre-grid"></div></div>
      <div class="modal-note" id="modal-note" style="display:none"><i class="fas fa-circle-info"></i><span id="modal-note-text"></span></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>
</div>

<!-- Warp flash -->
<div id="warp-flash"></div>

<script src="script.js" defer></script>
</body>
</html>
